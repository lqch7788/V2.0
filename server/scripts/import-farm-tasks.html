<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>导入农事任务数据</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    h1 { color: #333; }
    .info { background: #e3f2fd; padding: 15px; border-radius: 5px; margin: 20px 0; }
    .success { background: #d4edda; padding: 15px; border-radius: 5px; margin: 20px 0; color: #155724; }
    .error { background: #f8d7da; padding: 15px; border-radius: 5px; margin: 20px 0; color: #721c24; }
    button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; max-height: 300px; }
    .stats { display: flex; gap: 20px; margin: 20px 0; }
    .stat { background: #f8f9fa; padding: 15px; border-radius: 5px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #007bff; }
    .stat-label { color: #666; }
  </style>
</head>
<body>
  <h1>农事任务数据导入工具</h1>

  <div class="info">
    <strong>使用说明：</strong>
    <ol>
      <li>确保后端服务已启动 (npm run dev)</li>
      <li>本工具将 localStorage 中的任务数据导入到后端数据库</li>
      <li>已存在的数据会被跳过，不会重复导入</li>
    </ol>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="localCount">-</div>
      <div class="stat-label">本地任务数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="apiCount">-</div>
      <div class="stat-label">API任务数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="importedCount">0</div>
      <div class="stat-label">已导入</div>
    </div>
  </div>

  <div>
    <button id="loadBtn" onclick="loadData()">加载数据</button>
    <button id="importBtn" onclick="importToApi()" disabled>导入到后端</button>
    <button onclick="clearStorage()">清空本地数据</button>
  </div>

  <div id="result"></div>
  <pre id="preview" style="display:none;"></pre>

  <script>
    let localTasks = [];

    function loadData() {
      const result = document.getElementById('result');
      const preview = document.getElementById('preview');
      const localCount = document.getElementById('localCount');
      const importBtn = document.getElementById('importBtn');

      try {
        // 从 localStorage 读取数据
        const stored = localStorage.getItem('yuanxingtu_tasks');
        if (!stored) {
          result.innerHTML = '<div class="error">localStorage 中没有找到任务数据！</div>';
          return;
        }

        const parsed = JSON.parse(stored);
        localTasks = parsed.data || parsed;

        if (!Array.isArray(localTasks) || localTasks.length === 0) {
          result.innerHTML = '<div class="error">任务数据格式错误或为空！</div>';
          return;
        }

        localCount.textContent = localTasks.length;
        preview.textContent = JSON.stringify(localTasks.slice(0, 3), null, 2) + '\n... (' + (localTasks.length - 3) + ' more)';
        preview.style.display = 'block';
        importBtn.disabled = false;

        result.innerHTML = '<div class="success">成功加载 ' + localTasks.length + ' 条任务数据</div>';

        // 同时获取 API 数据量
        fetch('http://localhost:3001/api/farm-tasks?limit=1')
          .then(r => r.json())
          .then(data => {
            document.getElementById('apiCount').textContent = data.meta?.total || '0';
          })
          .catch(() => {
            document.getElementById('apiCount').textContent = 'API离线';
          });
      } catch (e) {
        result.innerHTML = '<div class="error">加载失败: ' + e.message + '</div>';
      }
    }

    async function importToApi() {
      const result = document.getElementById('result');
      const importedCount = document.getElementById('importedCount');
      const importBtn = document.getElementById('importBtn');

      if (localTasks.length === 0) {
        result.innerHTML = '<div class="error">请先加载数据！</div>';
        return;
      }

      importBtn.disabled = true;
      let imported = 0;
      let skipped = 0;
      let failed = 0;

      for (const task of localTasks) {
        try {
          const payload = {
            id: task.id,
            task_code: task.taskCode || task.id,
            task_title: task.title,
            task_type: task.typeName || task.type || '',
            task_content: task.description || task.remarks || '',
            assignee_id: task.assigneeId || '',
            assignee_name: task.assigneeName || '',
            greenhouse_id: task.greenhouseId || '',
            greenhouse_name: task.greenhouseName || '',
            area_name: task.field || '',
            plan_date: task.dueDate || '',
            plan_time: task.planEnd?.split(' ')[1] || '',
            priority: task.priority || 'medium',
            status: task.status || 'pending',
            batch_id: task.batchId || '',
            batch_code: task.batchCode || '',
            create_by: task.assignerName || '',
            create_by_id: task.assignerId || '',
            source_type: task.sourceType || '',
            progress: task.progress || 0,
            accepted_at: task.acceptedAt || '',
            completed_at: task.completedAt || '',
            rework_count: task.reworkCount || 0,
            version: task.version || 1,
            dispatch_mode: task.dispatchMode || '',
            feedback_requirements: JSON.stringify(task.feedbackRequirements || []),
            remarks: task.remarks || '',
            create_time: task.createdAt || new Date().toISOString(),
            update_time: task.updatedAt || new Date().toISOString()
          };

          const response = await fetch('http://localhost:3001/api/farm-tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            imported++;
          } else {
            const data = await response.json();
            if (data.error && data.error.includes('UNIQUE constraint failed')) {
              skipped++;
            } else {
              failed++;
              console.error('导入失败:', task.id, data);
            }
          }
        } catch (e) {
          failed++;
          console.error('导入异常:', task.id, e);
        }

        importedCount.textContent = imported + skipped + failed;
      }

      let html = '<div class="success">导入完成！</div>';
      html += '<p>成功导入: ' + imported + ' 条</p>';
      html += '<p>跳过(已存在): ' + skipped + ' 条</p>';
      if (failed > 0) {
        html += '<p class="error">失败: ' + failed + ' 条</p>';
      }
      result.innerHTML = html;

      importBtn.disabled = false;
    }

    function clearStorage() {
      if (confirm('确定要清空本地任务数据吗？这将删除所有本地任务！')) {
        localStorage.removeItem('yuanxingtu_tasks');
        localStorage.removeItem('yuanxingtu_tasks_version');
        localTasks = [];
        document.getElementById('localCount').textContent = '0';
        document.getElementById('preview').style.display = 'none';
        document.getElementById('result').innerHTML = '<div class="success">已清空本地数据，请刷新页面。</div>';
      }
    }

    // 自动加载
    window.onload = loadData;
  </script>
</body>
</html>
